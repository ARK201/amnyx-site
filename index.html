<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AmnyX Messenger | Secure Private Messaging App</title>

<!-- SEO -->
<meta name="description" content="AmnyX Messenger is a secure, private messaging app with end-to-end encryption, anonymity, and fast performance.">
<meta name="keywords" content="secure messaging, private chat app, encrypted messenger, anonymous messaging, AmnyX">
<meta name="robots" content="index, follow">

<!-- Open Graph -->
<meta property="og:title" content="AmnyX Messenger">
<meta property="og:description" content="Secure, private messaging built for speed and anonymity.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://amnyx.com">
<meta property="og:image" content="https://amnyx.com/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
}

/* Background (LESS blur now) */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("logo black bg.png") no-repeat center center;
    background-size: cover;
    filter: blur(2px); /* reduced blur */
    transform: scale(1.05);
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(11, 15, 23, 0.75);
    z-index: -1;
}

/* Glass Card */
.container {
    max-width: 520px;
    width: 100%;
    padding: 30px 25px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    text-align: center;

    animation: fadeIn 1s ease forwards;
}

/* Text animations */
h1, .tagline, .description {
    animation: fadeUp 1s ease forwards;
}

.tagline { animation-delay: 0.2s; }
h1 { animation-delay: 0.4s; }
.description { animation-delay: 0.6s; }

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* Text */
.tagline {
    color: #4DA6FF;
    font-size: 12px;
    letter-spacing: 1.5px;
    margin-bottom: 20px;
}

h1 {
    font-size: 50px;
    margin-bottom: 15px;
}

.description {
    color: #A0A0A0;
    margin-bottom: 30px;
}

/* Icons */
.social-icons {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 30px;
}

.social-icons a {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 20px;

    transition: all 0.3s ease;
    animation: popIn 0.6s ease forwards;
}

.social-icons a:nth-child(1) { animation-delay: 0.2s; }
.social-icons a:nth-child(2) { animation-delay: 0.3s; }
.social-icons a:nth-child(3) { animation-delay: 0.4s; }
.social-icons a:nth-child(4) { animation-delay: 0.5s; }
.social-icons a:nth-child(5) { animation-delay: 0.6s; }
.social-icons a:nth-child(6) { animation-delay: 0.7s; }
.social-icons a:nth-child(7) { animation-delay: 0.8s; }

@keyframes popIn {
    from {
        opacity: 0;
        transform: scale(0.7);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* Hover animation */
.social-icons a:hover {
    transform: translateY(-6px) scale(1.15);
    box-shadow: 0 10px 25px rgba(77,166,255,0.6);
}

/* Brand Colors */
.google { background: #34A853; }
.x { background: #000000; }
.facebook { background: #1877F2; }
.instagram { background: radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf); }
.mastodon { background: #6364FF; }
.email { background: #4DA6FF; }
.desktop { background: transparent; border: 2px solid #4DA6FF; color: #4DA6FF; }

/* Features */
.features {
    list-style: none;
    margin-top: 25px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.features li {
    margin-bottom: 15px;
}

/* Responsive */
@media (max-width: 600px) {
    h1 { font-size: 38px; }
}
</style>
</head>

<body>

<div class="container">

<div class="tagline">SECURE - PRIVATE - YOURS</div>

<h1>AmnyX<br>Messenger</h1>

<p class="description">
A next-generation secure messaging app<br>
built for privacy and speed.
</p>

<div class="social-icons">

<a href="https://play.google.com/store/apps/details?id=com.amnyx.messenger" target="_blank" class="google">
<i class="fab fa-google-play"></i>
</a>

<a href="https://x.com/amnyx_messenger" target="_blank" class="x">
<i class="fab fa-x-twitter"></i>
</a>

<a href="https://www.facebook.com/share/1M6FBL6Krp/" target="_blank" class="facebook">
<i class="fab fa-facebook-f"></i>
</a>

<a href="https://www.instagram.com/amnyx.messenger" target="_blank" class="instagram">
<i class="fab fa-instagram"></i>
</a>

<!-- Mastodon fixed -->
<a href="https://mastodon.social/@AmnyX" target="_blank" class="mastodon">
<i class="fab fa-mastodon"></i>
</a>

<a href="mailto:amnyxmessenger@gmail.com" class="email">
<i class="fas fa-envelope"></i>
</a>

<a href="https://tinyurl.com/amnyx-pc" target="_blank" class="desktop">
<i class="fas fa-desktop"></i>
</a>

</div>

<ul class="features">
<li>✅ End-to-end encrypted messaging</li>
<li>✅ No phone number required</li>
<li>✅ Anonymous and privacy-first</li>
<li>✅ Fast and lightweight</li>
<li>✅ Tor-ready architecture</li>
</ul>

</div>

</body>
</html>
