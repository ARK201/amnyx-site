<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmnyX Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
          content: "";
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;

          background: url("logo)(1).png") no-repeat center center;
          background-size: cover;

  filter: blur(20px);
  transform: scale(1.1);

  z-index: -1;
}

body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(11, 15, 23, 0.75);

  z-index: -1;
}
        
                
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.9; transform: translate(-50%, -50%) scale(1.02); }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes iconPop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }
        
        .tagline {
            color: #4DA6FF;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
            text-transform: uppercase;
            animation: fadeInUp 0.6s ease-out;
        }
        
        h1 {
            font-size: 56px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 16px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        
        .description {
            color: #A0A0A0;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 32px;
            max-width: 400px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }
        
        .social-icons {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }
        
        .social-icons a {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: iconPop 0.5s ease-out backwards;
        }
        
        .social-icons a:nth-child(1) { animation-delay: 0.8s; }
        .social-icons a:nth-child(2) { animation-delay: 0.9s; }
        .social-icons a:nth-child(3) { animation-delay: 1.0s; }
        .social-icons a:nth-child(4) { animation-delay: 1.1s; }
        .social-icons a:nth-child(5) { animation-delay: 1.2s; background: #4DA6FF; }
        .social-icons a:nth-child(6) { animation-delay: 1.3s; border: 2px solid #4DA6FF; }
        
        .social-icons a svg {
            width: 22px;
            height: 22px;
            fill: #000;
        }
        
        .social-icons a.email svg {
            fill: #fff;
        }
        
        .social-icons a:hover {
            transform: translateY(-4px) scale(1.1);
            box-shadow: 0 8px 24px rgba(77, 166, 255, 0.6);
        }
        
        .social-icons a:active {
            transform: translateY(-2px) scale(1.05);
        }
        
        .features {
            list-style: none;
            margin-top: 40px;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .features li {
            color: #E0E0E0;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.4;
            animation: slideInLeft 0.6s ease-out backwards;
        }
        
        .features li:nth-child(1) { animation-delay: 1.4s; }
        .features li:nth-child(2) { animation-delay: 1.5s; }
        .features li:nth-child(3) { animation-delay: 1.6s; }
        .features li:nth-child(4) { animation-delay: 1.7s; }
        
        .features li::before {
            content: '-';
            margin-right: 8px;
            color: #4DA6FF;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 42px;
            }
            .description {
                font-size: 14px;
            }
            .features li {
                font-size: 16px;
            }
        }
    </style>
</head>
